license = "ASL"
license-files = [ "LICENSE" ]

[tool.coverage.run]
branch = true
source = [ "app" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../../coverage/packages/agents/marketer/html'
 --cov-report xml:'../../../coverage/packages/agents/marketer/coverage.xml'
 --html='../../../reports/packages/agents/marketer/unittests/html/index.html'
 --junitxml='../../../reports/packages/agents/marketer/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "app" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "play_c463_z26_rzy_mar_tech.marketer"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "aws-opentelemetry-distro==0.15.0",
  "bedrock-agentcore[strands-agents]==1.4.0",
  "fastapi==0.128.5",
  "boto3==1.42.54",
  "httpx>=0.27.0",
  "mcp==1.26.0",
  "play_c463_z26_rzy_mar_tech.common",
  "strands-agents[a2a]==1.28.0",
  "strands-agents-evals==0.1.6",
  "strands-agents-tools==0.2.21",
  "uvicorn==0.40.0"
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
  "fastapi[standard]==0.128.5",
  "pytest>=9.0.0",
  "pytest-cov>=7.0.0",
  "pytest-html>=4.0.0",
  "coverage>=7.0.0"
]
