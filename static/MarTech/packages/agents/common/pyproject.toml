license = "ASL"
license-files = [ "LICENSE" ]

[tool.coverage.run]
branch = true
source = [ "common" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../../coverage/packages/agents/common/html'
 --cov-report xml:'../../../coverage/packages/agents/common/coverage.xml'
 --html='../../../reports/packages/agents/common/unittests/html/index.html'
 --junitxml='../../../reports/packages/agents/common/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "common" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "play_c463_z26_rzy_mar_tech.common"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "boto3==1.42.54",
  "fastapi==0.128.5",
  "httpx>=0.27.0",
  "mcp==1.26.0",
  "strands-agents[a2a]==1.28.0",
  "uvicorn==0.40.0"
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"
