baseURL = "/"
relativeURLs = false
canonifyURLs = false
defaultContentLanguage = "en"
ignoreFiles = ['(?:^|/)_tools(?:/|$)']

theme = "hugo-theme-learn"

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
themeVariant = "workshop"
editURL = ""
description = "Hands-on workshop: Agentic AI for MarTech — build a multi-agent marketing platform with AWS AgentCore."
author = "AWS BuildDay"
showVisitedLinks = true
disableBreadcrumb = false
disableNextPrev = false

[Languages]
[Languages.en]
title = "Agentic AI for MarTech"
weight = 1
label = "English"

[Languages.vi]
title = "Agentic AI cho MarTech"
weight = 2
label = "Tiếng Việt"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
